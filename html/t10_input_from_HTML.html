<body>
  <h1>T10-input from HTML</h1>
  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <p><br><br><i></i><br><br><br><br></p>

  <form onsubmit="return false;">
    <label for="nameField">Name:</label>
    <input type="text" id="nameField" placeholder="Ayush">

    <label for="ageField">Age:</label>
    <input type="number" id="ageField" placeholder="15">

    <label for="moneyField">Money:</label>
    <input type="number" id="moneyField" placeholder="20">

    <label for="yearField">Year:</label>
    <input type="number" id="yearField" placeholder="2026">

    <input type="submit" onClick="runTask10()">
  </form>

  <div id="spaceForJavaScriptOutput">
  </div>

  <script src="../t10_input_from_HTML.js"></script>
</body>
